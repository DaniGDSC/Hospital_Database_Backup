# Gitleaks configuration for Hospital Database Backup Project
# Detects hardcoded passwords, API keys, and known leaked credentials

title = "HospitalBackupDemo Secrets Policy"

# Known leaked password patterns
[[rules]]
id = "hardcoded-sql-password"
description = "Hardcoded SQL Server password"
regex = '''(?i)(sql_password|password)\s*=\s*['"]?[A-Za-z0-9@#$!%^&*]{8,}['"]?'''
tags = ["password", "sql"]
[rules.allowlist]
paths = ['''\.example$''', '''\.md$''', '''RUNBOOK''']

[[rules]]
id = "known-leaked-daniel"
description = "Known leaked password: Daniel@2410"
regex = '''Daniel@2410'''
tags = ["password", "known-leak"]

[[rules]]
id = "known-leaked-strong"
description = "Known leaked password pattern: Str0ng#Passw0rd"
regex = '''Str0ng#Passw0rd'''
tags = ["password", "known-leak"]

[[rules]]
id = "master-key-password"
description = "Master key password in source"
regex = '''MASTER_KEY_PASSWORD\s*=\s*['"][^'"$]+['"]'''
tags = ["password", "encryption"]
[rules.allowlist]
paths = ['''\.example$''', '''\.md$''']

[[rules]]
id = "cert-backup-password"
description = "Certificate backup password in source"
regex = '''CERT_BACKUP_PASSWORD\s*=\s*['"][^'"$]+['"]'''
tags = ["password", "encryption"]
[rules.allowlist]
paths = ['''\.example$''', '''\.md$''']

[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "key"]

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Access Key"
regex = '''(?i)aws_secret_access_key\s*=\s*[A-Za-z0-9/+=]{40}'''
tags = ["aws", "key"]

# Global allowlist
[allowlist]
paths = [
    '''\.env\.example$''',
    '''project\.conf\.example$''',
    '''\.gitleaks\.toml$''',
]
