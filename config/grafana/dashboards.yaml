# Grafana dashboard provisioning
apiVersion: 1

providers:
  - name: 'Hospital Monitoring'
    orgId: 1
    folder: 'Hospital Monitoring'
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
