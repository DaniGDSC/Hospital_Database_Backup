# Grafana notification routing policy
apiVersion: 1

policies:
  - orgId: 1
    receiver: email
    group_by: ['alertname', 'severity']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # CRITICAL: email + telegram immediately, repeat every 30 min
      - receiver: telegram
        matchers:
          - severity = critical
        group_wait: 0s
        repeat_interval: 30m
        continue: true  # also send to parent (email)

      # HIGH: email + telegram, repeat every hour
      - receiver: telegram
        matchers:
          - severity = high
        group_wait: 10s
        repeat_interval: 1h
        continue: true

      # MEDIUM: email only, repeat every 4 hours (default policy)
