# Staging Environment Configuration
# Mirrors production settings with separate resources
# HIPAA: Uses anonymized data only — verified before use

ENV="staging"
ENVIRONMENT="staging"

# SQL Server — separate database
SQL_SERVER="127.0.0.1"
SQL_PORT="14333"
DATABASE_NAME="HospitalBackupDemo_Staging"

# Debug
ENABLE_DEBUG="false"
LOG_LEVEL="INFO"

# S3 — separate bucket with versioning (no Object Lock)
S3_BUCKET_NAME="hospital-backup-staging"
S3_OBJECT_LOCK="false"
S3_REGION="ap-southeast-1"

# Backup retention — matches production for realistic testing
FULL_BACKUP_RETENTION_DAYS=7
DIFF_BACKUP_RETENTION_DAYS=2
LOG_BACKUP_RETENTION_HOURS=168
BACKUP_INTERVAL_MINUTES=60

# RPO/RTO — same as production for realistic testing
RPO_HOURS=1
RTO_HOURS=4

# Alerting — staging alerts separate from production
NOTIFY_EMAIL="${STAGING_ADMIN_EMAIL:-staging@hospital-backup.local}"
TELEGRAM_CHAT_ID="${STAGING_TELEGRAM_CHAT_ID:-}"

# Safety flags
ALLOW_DESTRUCTIVE_OPERATIONS="false"
REQUIRE_APPROVAL="true"
PHI_ENVIRONMENT="false"
