# ════════════════════════════════════════════════════
# Tool Version Requirements — Single Source of Truth
# ════════════════════════════════════════════════════
# All environments source this file first, then their
# environment-specific override (versions.{env}.conf).
#
# RULE: Staging and Production MUST use identical versions.
#       Dev may use newer versions for testing only.
#
# Change process:
#   1. Update this file in a Git PR
#   2. Test on dev → staging → production
#   3. Senior DBA approves production update
#   4. Schedule maintenance window

# ── CRITICAL: Pin exact version ──
# Changes here affect backup/recovery behavior

# SQL Server
SQLSERVER_VERSION="2022"
SQLSERVER_MIN_CU="CU14"
SQLSERVER_MIN_BUILD="16.0.4085"

# SQL Server command line tools
SQLCMD_MIN_VERSION="17.10"
MSSQL_TOOLS_PACKAGE="mssql-tools18"

# AWS CLI (affects S3 backup uploads)
AWSCLI_MIN_VERSION="2.13.0"
AWSCLI_PINNED_VERSION="2.15.0"

# ── IMPORTANT: Pin major version ──
# Changes here affect infrastructure

# Docker + Compose
DOCKER_MIN_VERSION="24.0"
DOCKER_COMPOSE_MIN_VERSION="2.24"

# Bash (shell scripts)
BASH_MIN_VERSION="5.0"

# OpenSSL (TLS cert generation, audit encryption)
OPENSSL_MIN_VERSION="3.0"

# ── INFORMATIONAL ──

# OS
OS_EXPECTED="Ubuntu 24"

# Grafana stack (pinned in docker-compose.yml)
GRAFANA_VERSION="11.0.0"
LOKI_VERSION="3.0.0"
PROMETHEUS_VERSION="2.53.0"
