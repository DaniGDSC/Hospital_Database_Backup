# Development Environment Configuration
# HIPAA: PHI must NEVER exist in development — use fake data only

ENV="development"
ENVIRONMENT="development"

# SQL Server — same host, different database name
SQL_SERVER="127.0.0.1"
SQL_PORT="14333"
DATABASE_NAME="HospitalBackupDemo_Dev"

# Debug
ENABLE_DEBUG="true"
LOG_LEVEL="DEBUG"

# S3 — separate bucket, no Object Lock (lower cost)
S3_BUCKET_NAME="hospital-backup-dev"
S3_OBJECT_LOCK="false"
S3_REGION="ap-southeast-1"

# Backup retention — shorter for dev
FULL_BACKUP_RETENTION_DAYS=3
DIFF_BACKUP_RETENTION_DAYS=1
LOG_BACKUP_RETENTION_HOURS=24
BACKUP_INTERVAL_MINUTES=30

# Alerting — dev alerts to separate channels
NOTIFY_EMAIL="${DEV_ADMIN_EMAIL:-dev@hospital-backup.local}"
TELEGRAM_CHAT_ID="${DEV_TELEGRAM_CHAT_ID:-}"

# Safety flags
ALLOW_DESTRUCTIVE_OPERATIONS="true"
REQUIRE_APPROVAL="false"
PHI_ENVIRONMENT="false"
