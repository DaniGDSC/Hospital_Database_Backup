# Prometheus configuration for Hospital Database Backup
global:
  scrape_interval: 60s
  evaluation_interval: 30s

scrape_configs:
  # Hospital database metrics (from export_metrics.sh)
  - job_name: hospital_db
    honor_timestamps: true
    scrape_interval: 60s
    static_configs:
      - targets: ['localhost:9090']
        labels:
          hospital: HospitalBackupDemo
    file_sd_configs: []
    # Read from textfile collector
    metrics_path: /metrics
    scheme: http

  # Node exporter (CPU, memory, disk)
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          hospital: HospitalBackupDemo

  # Loki metrics
  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics
