# ============================================
# Hospital Backup Project Configuration
# ============================================
# SECURITY: Sensitive values use environment variable fallbacks.
# In production, set these via AWS Secrets Manager, HashiCorp Vault,
# or environment variables — never hardcode passwords in this file.

# Project Information
PROJECT_NAME="Hospital Database Backup & Recovery Project"
PROJECT_CODE="INS3199"
AUTHOR="Database Administrator"
STUDENT_ID="INS3199-2026"
VERSION="1.0 (Complete)"

# SQL Server Configuration
SQL_SERVER="127.0.0.1"
SQL_PORT="14333"
SQL_USER="${SQL_USER:-SA}"
SQL_PASSWORD="${SQL_PASSWORD:?SQL_PASSWORD environment variable required}"
DATABASE_NAME="HospitalBackupDemo"

# Backup Configuration
BACKUP_ROOT="/var/opt/mssql/backup"
BACKUP_FULL_DIR="${BACKUP_ROOT}/full"
BACKUP_DIFF_DIR="${BACKUP_ROOT}/differential"
BACKUP_LOG_DIR="${BACKUP_ROOT}/log"

# AWS S3 Configuration
S3_BUCKET_NAME="hospital-backup-prod-lock"
S3_REGION="ap-southeast-1"
AWS_PROFILE="default"

# S3 credential (use IAM access key if not using AWS profile)
S3_ACCESS_KEY_ID="${S3_ACCESS_KEY_ID:-}"
S3_SECRET_ACCESS_KEY="${S3_SECRET_ACCESS_KEY:-}"

# Encryption Key Management
# These MUST be set via environment variables or secrets manager
CERT_BACKUP_PASSWORD="${CERT_BACKUP_PASSWORD:-}"
MASTER_KEY_PASSWORD="${MASTER_KEY_PASSWORD:-}"
CERT_S3_ENCRYPTION_KEY="${CERT_S3_ENCRYPTION_KEY:-}"

# Retention Policy
LOCAL_RETENTION_DAYS=7
S3_RETENTION_DAYS=90
LOG_BACKUP_RETENTION_HOURS=168

# Backup Schedule
FULL_BACKUP_DAY="Sunday"
FULL_BACKUP_TIME="02:00"
DIFF_BACKUP_TIME="02:00"
LOG_BACKUP_INTERVAL_MINUTES=60

# Recovery Objectives
RTO_HOURS=4   # Recovery Time Objective
RPO_HOURS=1   # Recovery Point Objective

# Email Notifications
NOTIFY_EMAIL="admin@hospital.com"
SMTP_SERVER="smtp.gmail.com"
SMTP_PORT="587"
SMTP_USER="alerts@hospital-backup.local"
SMTP_PASSWORD="${SMTP_PASSWORD:-configure_as_needed}"

# Logging
LOG_LEVEL="INFO"  # DEBUG, INFO, WARN, ERROR
LOG_RETENTION_DAYS=30

# Security
CERT_BACKUP_DIR="/var/opt/mssql/backup/certificates"
AWS_CREDS_DIR="$HOME/.aws/backup-credentials"
ENABLE_TDE="true"
ENABLE_COLUMN_ENCRYPTION="true"
ENABLE_AUDIT="true"

# Testing
TEST_DATABASE_NAME="HospitalBackupDemo_TEST"
TEST_RESTORE_DIR="/var/opt/mssql/test-restore"
