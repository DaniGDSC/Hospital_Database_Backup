# Production Environment Configuration
# HIPAA: Contains real PHI — all safeguards active

ENV="production"
ENVIRONMENT="production"

# SQL Server
SQL_SERVER="127.0.0.1"
SQL_PORT="14333"
DATABASE_NAME="HospitalBackupDemo"

# Debug
ENABLE_DEBUG="false"
LOG_LEVEL="INFO"

# S3 — Object Lock enabled (WORM / ransomware-resistant)
S3_BUCKET_NAME="hospital-backup-prod-lock"
S3_OBJECT_LOCK="true"
S3_REGION="ap-southeast-1"

# Backup retention
BACKUP_INTERVAL_MINUTES=60

# Deployment controls
REQUIRE_APPROVAL="true"
APPROVER_ROLE="senior_dba"
DEPLOYMENT_LOG="logs/deployment_history.json"
PRE_DEPLOY_CHECK="scripts/utilities/pre_deployment_check.sh"
MAX_DEPLOYMENT_WINDOW="02:00-04:00"

# Safety flags
ALLOW_DESTRUCTIVE_OPERATIONS="false"
PHI_ENVIRONMENT="true"
