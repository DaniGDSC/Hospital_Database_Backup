# Hospital Database Backup — Observability Stack
# Services: Loki, Promtail, Grafana, Prometheus, Node Exporter
# Start: docker compose up -d
# Ports: Grafana=3000, Prometheus=9090, Loki=3100, Node=9100

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: hospital-loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./config/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: always
    networks:
      - hospital-observability

  promtail:
    image: grafana/promtail:3.0.0
    container_name: hospital-promtail
    volumes:
      - ./config/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - ./logs:/app/logs:ro
      - /var/opt/mssql/log:/mssql-logs:ro
      - /var/opt/mssql/backup/audit-export:/audit-export:ro
      - /var/opt/mssql/backup/logs:/backup-logs:ro
    command: -config.file=/etc/promtail/config.yaml
    restart: always
    depends_on:
      - loki
    networks:
      - hospital-observability

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: hospital-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus-config.yaml:/etc/prometheus/prometheus.yml:ro
      - /var/opt/mssql/backup/metrics:/metrics:ro
      - prometheus-data:/prometheus
    restart: always
    networks:
      - hospital-observability

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: hospital-node-exporter
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: always
    networks:
      - hospital-observability

  grafana:
    image: grafana/grafana:11.0.0
    container_name: hospital-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_SECRET_KEY=${GRAFANA_SECRET_KEY:-defaultsecretkey32chars000000000}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_LOGIN_REMEMBER_DAYS=0
      - GF_AUTH_LOGIN_MAXIMUM_INACTIVE_LIFETIME_DURATION=30m
      - GF_AUTH_LOGIN_MAXIMUM_LIFETIME_DURATION=12h
      - GF_UNIFIED_ALERTING_ENABLED=true
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/all.yaml:ro
      - ./config/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/all.yaml:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./config/grafana/alerting:/etc/grafana/provisioning/alerting:ro
    restart: always
    depends_on:
      - loki
      - prometheus
    networks:
      - hospital-observability

volumes:
  loki-data:
  grafana-data:
  prometheus-data:

networks:
  hospital-observability:
    driver: bridge
